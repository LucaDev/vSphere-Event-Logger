---
name: "Image Build"

on:
  push:
    tags:
      - "*"

jobs:
  build-platform-images:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Build Image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |-
            org.opencontainers.image.title=vsphere-eventlogger
            org.opencontainers.image.url=https://ghcr.io/lucadev/vsphere-eventlogger
            org.opencontainers.image.source=https://github.com/lucadev/vsphere-eventlogger
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=lucadev
          push: true
          tags: |-
            ghcr.io/lucadev/vsphere-eventlogger:${{ github.ref_name }}
            ghcr.io/lucadev/vsphere-eventlogger:latest
