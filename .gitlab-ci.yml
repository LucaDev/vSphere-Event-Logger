stages:
  - build
  - docker

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/vsphere-eventlogger

build_binary:
  stage: build
  image: golang:1.26-alpine
  script:
    - apk add --no-cache make
    - make build
  artifacts:
    paths:
      - vsphere-eventlogger
    expire_in: 1 week

build_container:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
